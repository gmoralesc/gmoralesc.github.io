<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logic Gate Builder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1 id="app-title">NAND</h1>
      <div id="theme-bar" role="group" aria-label="Theme">
        <button data-theme-opt="system" title="Match system theme">Auto</button>
        <button data-theme-opt="light"  title="Light theme">Light</button>
        <button data-theme-opt="dark"   title="Dark theme">Dark</button>
      </div>
    </header>

    <div id="main">
      <aside id="sidebar-left">
        <div class="side-sec">
          <div class="side-title">Gates</div>
          <div id="gate-list"></div>
          <input id="title" type="text" spellcheck="false" placeholder="name your gate…" />
          <button id="create-btn" class="side-btn" title="Save the current canvas as a reusable gate (named by the field above)">+ Create gate</button>
        </div>

        <div class="side-sec">
          <div class="side-title">Groups</div>
          <div id="io-controls">
            <button data-act="add-in"  title="Add input group">+ in</button>
            <button data-act="del-in"  title="Remove last input group">− in</button>
            <button data-act="add-out" title="Add output group">+ out</button>
            <button data-act="del-out" title="Remove last output group">− out</button>
          </div>
        </div>
      </aside>

      <div id="canvas">
        <svg id="wires"></svg>
        <div id="nodes"></div>
      </div>

      <aside id="sidebar-right">
        <section id="challenges">
          <div class="side-title">Challenges</div>
          <div id="ch-list"></div>
        </section>
        <section id="truth-wrap">
          <div class="side-title">Truth table</div>
          <div id="truth"></div>
        </section>
        <button id="reset-btn" class="side-btn danger"
                title="Delete all custom gates and progress, keeping only AND and NOT">Reset challenges</button>
      </aside>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
